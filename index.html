<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prohyas Portfolio</title>
    <style>
        /* Esto elimina bordes y hace que el diseño de Canva use toda la pantalla */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #ffffff;
        }
        .container { 
            width: 100vw; 
            height: 100vh; 
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <iframe loading="lazy" 
            src="https://www.canva.com/design/DAGy-K164To/1-byiRWwweZ2d8RmlBsJ1w/view?embed" 
            allowfullscreen="allowfullscreen" 
            allow="fullscreen">
        </iframe>
    </div>
</body>
</html>
