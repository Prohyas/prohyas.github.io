<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prohyas Portfolio</title>
    <style>
        /* Eliminamos todos los márgenes y forzamos que ocupe todo el alto */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #ffffff;
        }
        .canva-wrapper {
            position: relative;
            width: 100%;
            height: 100vh; /* Ocupa el 100% de la ventana del navegador */
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="canva-wrapper">
        <iframe loading="lazy" 
            src="https://www.canva.com/design/DAGy-K164To/1-byiRWwweZ2d8RmlBsJ1w/view?embed" 
            allowfullscreen="allowfullscreen" 
            allow="fullscreen">
        </iframe>
    </div>

</body>
</html>
